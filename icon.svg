<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="60%" stop-color="#c8860a"/>
      <stop offset="100%" stop-color="#7a4500"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c8a000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30"  cy="25"  r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="210" cy="40"  r="0.9" fill="#fff" opacity="0.5"/>
  <circle cx="55"  cy="210" r="1.0" fill="#fff" opacity="0.6"/>
  <circle cx="225" cy="195" r="1.4" fill="#fff" opacity="0.4"/>
  <circle cx="190" cy="220" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="20"  cy="160" r="1.1" fill="#fff" opacity="0.5"/>
  <circle cx="240" cy="120" r="0.9" fill="#fff" opacity="0.4"/>
  <circle cx="70"  cy="35"  r="0.7" fill="#fff" opacity="0.5"/>

  <!-- Outer hexagon border -->
  <polygon points="128,14 222,66 222,190 128,242 34,190 34,66"
           fill="none" stroke="#c8a000" stroke-width="2.5" opacity="0.9"/>

  <!-- Inner hexagon fill -->
  <polygon points="128,28 210,74 210,182 128,228 46,182 46,74"
           fill="#0a1428" opacity="0.8"/>

  <!-- Orbit ring 1 (tilted) -->
  <ellipse cx="128" cy="128" rx="72" ry="22"
           fill="none" stroke="#3a7bd5" stroke-width="1.5" opacity="0.6"
           transform="rotate(-30 128 128)"/>

  <!-- Orbit ring 2 (tilted other way) -->
  <ellipse cx="128" cy="128" rx="72" ry="22"
           fill="none" stroke="#3a7bd5" stroke-width="1.5" opacity="0.6"
           transform="rotate(30 128 128)"/>

  <!-- Orbit ring 3 (vertical) -->
  <ellipse cx="128" cy="128" rx="72" ry="22"
           fill="none" stroke="#3a7bd5" stroke-width="1.5" opacity="0.6"
           transform="rotate(90 128 128)"/>

  <!-- Glow behind core -->
  <circle cx="128" cy="128" r="38" fill="url(#glow)"/>

  <!-- Core orb -->
  <circle cx="128" cy="128" r="22" fill="url(#core)" filter="url(#blur-glow)"/>
  <circle cx="128" cy="128" r="22" fill="url(#core)"/>

  <!-- Core shine -->
  <circle cx="121" cy="120" r="7" fill="#fff" opacity="0.25"/>

  <!-- Small orbit dots -->
  <circle cx="200" cy="106" r="4" fill="#3a7bd5" opacity="0.9"/>
  <circle cx="62"  cy="155" r="3" fill="#3a7bd5" opacity="0.8"/>
  <circle cx="155" cy="57"  r="3.5" fill="#5a9bf5" opacity="0.7"/>

  <!-- "AO" monogram -->
  <text x="128" y="135" font-family="Georgia, serif" font-size="18" font-weight="bold"
        fill="#ffe566" text-anchor="middle" opacity="0.95" letter-spacing="2">AO</text>
</svg>
